name: Deploy Netflix Clone

on:
  push:
    branches:
      - master  # Runs every time you push to master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'yarn' # This speeds up future builds by caching dependencies

      - name: Install & Build
        run: |
          yarn install
          yarn build
        env:
          # Prevents warnings (PascalCase, unused vars) from failing the build
          CI: false 
          REACT_APP_TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # react-scripts creates a 'build' folder
          path: './build' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4